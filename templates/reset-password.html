<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation - Leyamo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ version }}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h2>🔑 Réinitialisation</h2>
        <label for="nouveau_mot_de_passe">Nouveau mot de passe</label>
        <input type="password" id="nouveau_mot_de_passe" placeholder="Minimum 6 caractères">
        <button onclick="reinitialiser()">Réinitialiser</button>
        <p id="message"></p>
        <p style="text-align:center;margin-top:15px;">
            <a href="/connexion" style="color:#0f766e;text-decoration:none;">🔙 Retour à la connexion</a>
        </p>
    </div>
</div>
<script>
const API = "";
const params = new URLSearchParams(window.location.search);
const token = params.get("token");
async function reinitialiser() {
    const nouveau_mot_de_passe = document.getElementById("nouveau_mot_de_passe").value;
    if (!nouveau_mot_de_passe || nouveau_mot_de_passe.length < 6) {
        document.getElementById("message").innerHTML = "⚠️ Mot de passe minimum 6 caractères";
        document.getElementById("message").style.color = "red";
        return;
    }
    try {
        const reponse = await fetch(`${API}/vendeurs/reset-password/confirm`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, nouveau_mot_de_passe })
        });
        const data = await reponse.json();
        if (reponse.status === 200) {
            document.getElementById("message").innerHTML = "✅ " + data.message;
            document.getElementById("message").style.color = "green";
            setTimeout(() => { window.location.href = "/connexion"; }, 2000);
        } else {
            document.getElementById("message").innerHTML = "❌ " + data.message;
            document.getElementById("message").style.color = "red";
        }
    } catch (erreur) {
        document.getElementById("message").innerHTML = "❌ Erreur réseau";
        document.getElementById("message").style.color = "red";
    }
}
</script>
<script src="{{ url_for('static', filename='back-to-top.js') }}?v={{ version }}"></script>
</body>
</html>
