<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Connexion - Leyamo</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ version }}">
<body>
<div class="login-container">
    <div class="login-box">
        <h2>Connexion <span>vendeur</span></h2>
        <!-- Message personnalisé pour les vendeurs -->
<div id="bienvenue-connexion" style="display:none; background:#d1fae5; padding:12px 16px; border-radius:10px; margin-bottom:16px; border-left:4px solid #0f766e;">
    <p style="margin:0; font-size:14px; color:#064e3b;">
        👋 <span id="nom-vendeur-bienvenue">Vendeur</span>, ravi de vous revoir sur Leyamo !
        <br><small style="font-weight:400;">Vous pouvez gérer vos produits depuis votre dashboard.</small>
    </p>
</div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Ex: jean@exemple.com">
        <label for="mot_de_passe">Mot de passe</label>
        <input type="password" id="mot_de_passe" placeholder="Votre mot de passe">
        <a class="lien-oubli" onclick="ouvrirResetPassword()">Mot de passe oublié ?</a>
        <button onclick="connexion()">Se connecter</button>
        <p id="message"></p>
        <p style="text-align:center;margin-top:15px;">Pas encore de compte ? <a href="inscription.html" style="color:#0f766e;text-decoration:none;">Inscrivez-vous</a></p>
    </div>
</div>
<script>
function ouvrirResetPassword() {
    const email = prompt("Entrez votre email pour réinitialiser votre mot de passe :");
    if (email) {
        fetch(`${API}/vendeurs/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        })
        .then(res => res.json())
        .then(data => afficherNotification(data.message, data.message.includes("envoyé") ? "success" : "error"))
        .catch(() => afficherNotification("Erreur réseau", "error"));
    }
}
</script>
 <script src="{{ url_for('static', filename='connexion.js') }}?v={{ version }}"></script>
 <script src="{{ url_for('static', filename='notifications.js') }}?v={{ version }}"></script>
 <script src="{{ url_for('static', filename='back-to-top.js') }}?v={{ version }}"></script>
 <script src="{{ url_for('static', filename='form-confirm.js') }}?v={{ version }}"></script>
</body>
</html>
