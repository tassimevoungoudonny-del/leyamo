<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Produit - Leyamo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h2>Modifier le <span>produit</span></h2>
        <p id="info-produit" style="font-size:13px; color:#64748b; margin-bottom:12px;"></p>
        <label for="nom_produit">Nom *</label>
        <input type="text" id="nom_produit">
        <label for="description_produit">Description</label>
        <textarea id="description_produit"></textarea>
        <label for="prix">Prix (FCFA) *</label>
        <input type="number" id="prix">
        <label for="categorie">Catégorie *</label>
        <select id="categorie">
            <option value="Vêtements">Vêtements</option>
            <option value="Chaussures">Chaussures</option>
            <option value="Maillot">Maillot</option>
            <option value="Électronique">Électronique</option>
            <option value="Accessoires">Accessoires</option>
            <option value="Maison">Maison</option>
            <option value="Autre">Autre</option>
        </select>
        <label for="genre">Genre</label>
        <select id="genre">
            <option value="unisexe">Unisexe</option>
            <option value="masculin">Masculin</option>
            <option value="feminin">Féminin</option>
        </select>

        <!-- NOUVEAU : champ image avec aperçu -->
        <label for="image_produit">Image du produit (optionnel)</label>
        <img id="image_actuelle" src="" style="max-width:100px; max-height:100px; display:block; margin-bottom:10px;">
        <input type="file" id="image_produit" accept="image/*">
        <div id="preview-nouvelle-image" style="display:none; margin-top:10px;">
            <p>Nouvelle image sélectionnée :</p>
            <img id="nouvelle-image-preview" src="" style="max-width:100px; max-height:100px;">
        </div>

        <button onclick="modifierProduit()" id="btn-modifier">Enregistrer</button>
        <p id="message"></p>
    </div>
</div>
<script src="notifications.js"></script>
<script src="modifier-produit.js"></script>
<script src="back-to-top.js"></script>
<script src="form-confirm.js"></script>
</body>
</html>
