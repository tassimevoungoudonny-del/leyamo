<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Leyamo Store</title><link rel="stylesheet" href="style.css"></head>
<body>
<header><div class="logo-zone"><img src="logo.webp" alt="Leyamo" class="logo"><h2>Leyamo <span>Store</span></h2></div><nav><a href="index.html">Accueil</a><a href="connexion.html">Connexion</a><a href="inscription.html">Inscription</a></nav></header>
<section class="hero">
    <h1>Trouvez les meilleurs produits près de chez vous</h1>
    <div class="search-box"><input type="text" id="recherche" placeholder="Rechercher un produit..."><button onclick="rechercherProduit(1)">Rechercher</button><button onclick="reinitialiserRecherche()" style="border-radius:50px;margin-left:5px;">✕</button></div>
    <div class="filtre-container">
        <div class="groupe-filtres"><span>Catégorie :</span><button class="filtre-btn active" data-categorie="all">Tous</button><button class="filtre-btn" data-categorie="Vêtements">👕 Vêtements</button><button class="filtre-btn" data-categorie="Chaussures">👟 Chaussures</button><button class="filtre-btn" data-categorie="Maillot">🏊 Maillot</button></div>
        <div class="groupe-filtres"><span>Genre :</span><button class="filtre-genre active" data-genre="all">Tous</button><button class="filtre-genre" data-genre="masculin">👨 Masculin</button><button class="filtre-genre" data-genre="feminin">👩 Féminin</button></div>
    </div>
</section>
<section class="produits-section"><h2>Produits disponibles</h2><div id="liste-produits" class="grille-produits"></div><div id="pagination"></div></section>
<footer>
    <p>© 2026 <span>Leyamo</span> Store</p>
    <p style="margin-top: 8px; font-size: 13px;">
        <a href="a-propos.html" style="color: #a7f3d0; text-decoration: underline;">À propos</a>
        &nbsp;|&nbsp; 
        <a href="mailto:contact@leyamo.com" style="color: #a7f3d0; text-decoration: underline;">Contact</a>
    </p>
</footer>
<script src="app.js"></script><script src="notifications.js"></script>
</body>
</html>
