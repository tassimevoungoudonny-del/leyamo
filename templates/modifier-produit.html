<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Produit - Leyamo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ version }}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h2>Modifier le <span>produit</span></h2>
        <p id="info-produit" style="font-size:13px; color:#64748b; margin-bottom:12px;"></p>
        <label for="nom_produit">Nom</label>
        <input type="text" id="nom_produit">
        <label for="description_produit">Description</label>
        <textarea id="description_produit"></textarea>
        <label for="prix">Prix (FCFA)</label>
        <input type="number" id="prix">
        <label for="categorie">Catégorie</label>
        <select id="categorie">
            <option value="Vêtements">Vêtements</option>
            <option value="Chaussures">Chaussures</option>
            <option value="Maillot">Maillot</option>
            <option value="Électronique">Électronique</option>
            <option value="Accessoires">Accessoires</option>
            <option value="Maison">Maison</option>
            <option value="Autre">Autre</option>
        </select>
        <label for="genre">Genre</label>
        <select id="genre">
            <option value="unisexe">Unisexe</option>
            <option value="masculin">Masculin</option>
            <option value="feminin">Féminin</option>
        </select>
        <label for="images_produit">Nouvelles photos (3 max, 10 Mo)</label>
        <input type="file" id="images_produit" accept="image/*" multiple>
        <div id="preview-images" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;"></div>
        <button onclick="modifierProduit()" id="btn-modifier">Enregistrer</button>
        <p id="message"></p>
    </div>
</div>
<script src="{{ url_for('static', filename='notifications.js') }}?v={{ version }}"></script>
<script src="{{ url_for('static', filename='modifier-produit.js') }}?v={{ version }}"></script>
<script src="{{ url_for('static', filename='back-to-top.js') }}?v={{ version }}"></script>
<script src="{{ url_for('static', filename='form-confirm.js') }}?v={{ version }}"></script>
</body>
</html>
