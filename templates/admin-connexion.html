<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin - Connexion</title>
  <link rel="stylesheet" href="/static/style.css?v={{ version }}">
<div class="login-container">
    <div class="login-box">
        <h2>🔐 Admin <span>Leyamo</span></h2>
        <label for="email">Email</label><input type="email" id="email" placeholder="admin@leyamo.com">
        <label for="mot_de_passe">Mot de passe</label><input type="password" id="mot_de_passe" placeholder="Mot de passe">
        <button onclick="adminLogin()">Se connecter</button>
        <p id="message"></p>
    </div>
</div>
<script>
const API = "";

async function adminLogin() {
    const email = document.getElementById("email").value.trim();
    const mot_de_passe = document.getElementById("mot_de_passe").value;
    if (!email || !mot_de_passe) {
        document.getElementById("message").innerHTML = "⚠️ Remplissez tous les champs";
        document.getElementById("message").style.color = "red";
        return;
    }
    try {
        const reponse = await fetch(`${API}/admin/connexion`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, mot_de_passe })
        });
        const data = await reponse.json();
        if (data.token) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("csrf_token", data.csrf_token);
            document.getElementById("message").innerHTML = "✅ Connexion réussie";
            document.getElementById("message").style.color = "green";
            setTimeout(() => { window.location.href = "admin.html"; }, 1000);
        } else {
            document.getElementById("message").innerHTML = "❌ " + data.message;
            document.getElementById("message").style.color = "red";
        }
    } catch (erreur) {
        document.getElementById("message").innerHTML = "❌ Erreur réseau";
        document.getElementById("message").style.color = "red";
    }
}
</script>
<script src="/static/back-to-top.js?v={{ version }}"></script>
<script src="/static/form-confirm.js?v={{ version }}"></script>

</body>

</html>
